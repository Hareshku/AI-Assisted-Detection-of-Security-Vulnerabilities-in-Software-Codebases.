<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1d2e, #16213e);
            padding: 20px 40px;
            border-bottom: 1px solid #2a2d3e;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 {
            font-size: 1.6rem;
            color: #00d4ff;
        }

        header p {
            color: #888;
            font-size: 0.85rem;
        }

        .shield { font-size: 2rem; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Upload Box */
        .upload-box {
            background: #1a1d2e;
            border: 2px dashed #2a2d3e;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s;
            margin-bottom: 30px;
        }

        .upload-box:hover { border-color: #00d4ff; }

        .upload-box h2 { color: #00d4ff; margin-bottom: 10px; }
        .upload-box p  { color: #888; margin-bottom: 20px; font-size: 0.9rem; }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-label {
            background: #00d4ff;
            color: #0f1117;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .upload-label:hover { background: #00b8d9; }

        .scan-btn {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: block;
            margin: 10px auto 0;
        }

        .scan-btn:hover { background: #6d28d9; }

        #file-name {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        /* Results */
        .results { margin-top: 10px; }

        .result-card {
            background: #1a1d2e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #2a2d3e;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-card.HIGH   { border-left-color: #ef4444; }
        .result-card.MEDIUM { border-left-color: #f59e0b; }
        .result-card.LOW    { border-left-color: #22c55e; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-header h3 { font-size: 1rem; color: #ccc; }

        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge.HIGH   { background: #ef444422; color: #ef4444; }
        .badge.MEDIUM { background: #f59e0b22; color: #f59e0b; }
        .badge.LOW    { background: #22c55e22; color: #22c55e; }

        /* Score Bar */
        .score-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .score-label { color: #888; font-size: 0.85rem; width: 100px; }

        .score-bar-bg {
            flex: 1;
            background: #2a2d3e;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .score-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }

        .score-bar.HIGH   { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .score-bar.MEDIUM { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .score-bar.LOW    { background: linear-gradient(90deg, #22c55e, #16a34a); }

        .score-num { color: #fff; font-weight: bold; width: 50px; text-align: right; }

        /* ML Probability */
        .ml-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .ml-bar-bg {
            flex: 1;
            background: #2a2d3e;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .ml-bar {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #7c3aed, #6d28d9);
        }

        /* Reasons */
        .reasons { margin-top: 10px; }
        .reasons h4 { color: #888; font-size: 0.8rem; margin-bottom: 8px; }

        .reason-item {
            background: #0f1117;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #f59e0b;
            margin-bottom: 5px;
        }

        .no-threat {
            color: #22c55e;
            font-size: 0.85rem;
        }

        /* Loading */
        #loading {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #2a2d3e;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Summary bar */
        .summary {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-card {
            flex: 1;
            background: #1a1d2e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .summary-card .num  { font-size: 2rem; font-weight: bold; }
        .summary-card .lbl  { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .summary-card.high  .num { color: #ef4444; }
        .summary-card.med   .num { color: #f59e0b; }
        .summary-card.low   .num { color: #22c55e; }
        .summary-card.total .num { color: #00d4ff; }

        .error-msg {
            background: #ef444422;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .violation-item {
            background: #0f1117;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid #888;
        }

        .violation-item .rule-id {
            font-size: 0.7rem;
            color: #666;
            font-family: monospace;
            margin-right: 8px;
        }

        .violation-item strong {
            color: #ddd;
            font-size: 0.85rem;
        }

        .violation-item .rule-desc {
            color: #888;
            font-size: 0.78rem;
            margin-top: 3px;
        }

        .violation-item.high   { border-left-color: #ef4444; }
        .violation-item.medium { border-left-color: #f59e0b; }
        .violation-item.low    { border-left-color: #22c55e; }
    </style>
</head>
<body>

<header>
    <div class="shield">🛡️</div>
    <div>
        <h1>AI Security Scanner</h1>
        <p>Detect vulnerabilities in source code & CI/CD pipelines</p>
    </div>
</header>

<div class="container">

    <!-- Upload Box -->
    <div class="upload-box">
        <h2>🔍 Scan Your Files</h2>
        <p>Upload Python (.py) or pipeline (.yml / .yaml) files for AI-powered security analysis</p>

        <label class="upload-label" for="fileInput">📁 Choose Files</label>
        <input type="file" id="fileInput" multiple accept=".py,.yml,.yaml">

        <div id="file-name">No files selected</div>
        <button class="scan-btn" onclick="scanFiles()">🚀 Run Security Scan</button>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p style="color:#888">Analyzing files with AI...</p>
    </div>

    <!-- Results -->
    <div class="results" id="results"></div>

</div>

<script>
    // Show selected file names
    document.getElementById('fileInput').addEventListener('change', function() {
        const names = Array.from(this.files).map(f => f.name).join(', ');
        document.getElementById('file-name').textContent =
            names || 'No files selected';
    });

    async function scanFiles() {
        const input = document.getElementById('fileInput');
        if (!input.files.length) {
            alert('Please select at least one file!');
            return;
        }

        // Show loading
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';

        const formData = new FormData();
        for (const file of input.files) {
            formData.append('files', file);
        }

        try {
            const response = await fetch('/scan', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            displayResults(data);
        } catch (err) {
            document.getElementById('results').innerHTML =
                `<div class="error-msg">❌ Error: ${err.message}</div>`;
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function displayResults(data) {
        const container = document.getElementById('results');

        if (data.error) {
            container.innerHTML = `<div class="error-msg">❌ ${data.error}</div>`;
            return;
        }

        const results = data.results;
        const high   = results.filter(r => r.risk_level === 'HIGH').length;
        const medium = results.filter(r => r.risk_level === 'MEDIUM').length;
        const low    = results.filter(r => r.risk_level === 'LOW').length;

        // Summary
        let html = `
            <div class="summary">
                <div class="summary-card total">
                    <div class="num">${results.length}</div>
                    <div class="lbl">Files Scanned</div>
                </div>
                <div class="summary-card high">
                    <div class="num">${high}</div>
                    <div class="lbl">High Risk</div>
                </div>
                <div class="summary-card med">
                    <div class="num">${medium}</div>
                    <div class="lbl">Medium Risk</div>
                </div>
                <div class="summary-card low">
                    <div class="num">${low}</div>
                    <div class="lbl">Low Risk</div>
                </div>
            </div>
        `;

        // Result cards
        for (const r of results) {
            const level = r.risk_level;
            const prob  = Math.round(r.ml_probability * 100);

            const reasonsHtml = r.reasons.length
                ? r.reasons.map(reason =>
                    `<div class="reason-item">⚠️ ${reason}</div>`
                  ).join('')
                : `<div class="no-threat">✅ No threats detected</div>`;

            const violations = r.violations || [];
            const violationsHtml = violations.length
                ? violations.map(v => {
                    const sevClass = v.severity.toLowerCase();
                    return `<div class="violation-item ${sevClass}">
                                <span class="rule-id">${v.rule_id}</span>
                                <strong>${v.name}</strong>
                                <div class="rule-desc">${v.description}</div>
                            </div>`;
                  }).join('')
                : `<div class="no-threat">✅ No rule violations</div>`;

            html += `
                <div class="result-card ${level}">
                    <div class="card-header">
                        <h3>📄 ${r.filename}</h3>
                        <span class="badge ${level}">${level} RISK</span>
                    </div>

                    <div class="score-row">
                        <span class="score-label">Risk Score</span>
                        <div class="score-bar-bg">
                            <div class="score-bar ${level}"
                                 style="width: ${r.risk_score}%"></div>
                        </div>
                        <span class="score-num">${r.risk_score}/100</span>
                    </div>

                    <div class="ml-row">
                        <span class="score-label">ML Confidence</span>
                        <div class="ml-bar-bg">
                            <div class="ml-bar" style="width: ${prob}%"></div>
                        </div>
                        <span class="score-num">${prob}%</span>
                    </div>

                    <div class="reasons">
                        <h4>FINDINGS</h4>
                        ${reasonsHtml}
                    </div>

                    <div class="reasons">
                        <h4>RULE VIOLATIONS (${r.violation_counts ? r.violation_counts.high : 0} HIGH, ${r.violation_counts ? r.violation_counts.medium : 0} MED, ${r.violation_counts ? r.violation_counts.low : 0} LOW)</h4>
                        ${violationsHtml}
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
    }
</script>

</body>
</html>
